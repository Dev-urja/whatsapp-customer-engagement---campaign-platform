services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: urja_whatsapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urja_whatsapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_MODE: postgres
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: urja_whatsapp
      PGUSER: postgres
      PGPASSWORD: ${PGPASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PUBLIC_URL: ${PUBLIC_URL}
      APP_URL: ${APP_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v21.0}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
